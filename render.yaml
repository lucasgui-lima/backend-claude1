# Render Blueprint — deploy automático do backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: gestao-manutencao-api
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  #  configura manualmente no dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
